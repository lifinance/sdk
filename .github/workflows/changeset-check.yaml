name: Changeset Check

# Fail-closed gate: a PR that touches a publishable package MUST ship a changeset.
# Exemptions: docs-only / chore-only PRs (no publishable source changed) pass without one.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: changeset-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changeset:
    name: Require changeset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need base branch history so `changeset status --since` can diff.
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Detect publishable package changes
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # List files changed in this PR, then keep only those under a publishable
          # package's source (packages/*/{src,package.json}). Docs, root config, CI,
          # scripts, examples and *.md are NOT publishable surface -> exempt.
          CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          echo "Changed files:"; echo "$CHANGED"
          PUBLISHABLE="$(echo "$CHANGED" \
            | grep -E '^packages/[^/]+/(src/|package\.json)' \
            | grep -vE '\.(md)$' \
            | grep -vE '\.(spec|test|mock|handlers)\.ts$' || true)"
          if [ -n "$PUBLISHABLE" ]; then
            echo "Publishable changes detected:"; echo "$PUBLISHABLE"
            echo "needsChangeset=true" >> "$GITHUB_OUTPUT"
          else
            echo "No publishable package source changed — changeset not required."
            echo "needsChangeset=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify a changeset is present
        if: steps.scope.outputs.needsChangeset == 'true'
        run: |
          # `changeset status` exits non-zero when there are NO changesets relative to
          # the base branch. We invert that into an explicit, readable failure so the
          # gate fails closed: a publishable change without a changeset blocks the PR.
          if pnpm changeset status --since=origin/${{ github.base_ref }}; then
            echo "✔ Changeset present for publishable changes."
          else
            echo "::error::This PR changes a publishable package but has no changeset."
            echo "Add one with: pnpm changeset"
            echo "(Docs-only / chore-only PRs are exempt and would not reach this check.)"
            exit 1
          fi
