name: 'Release · Linear Sync'

# Reusable: syncs a published release into a Linear release pipeline.
# Called by publish.yaml once per anchor package after `changeset publish`
# succeeds; not triggered on its own.
#
# Version + channel are DERIVED by the caller from the changesets
# publishedPackages output (NOT from a git tag) and passed in here.
on:
  workflow_call:
    inputs:
      release_name:
        description: 'Linear release name prefix (e.g. "Widget" or "Checkout")'
        required: true
        type: string
      version:
        description: 'Released semver, prerelease stripped (e.g. 4.0.0)'
        required: true
        type: string
      channel:
        description: 'Release channel: alpha | beta | stable'
        required: true
        type: string
      release_tag:
        description: 'Full per-package GitHub release tag (e.g. @lifi/widget@4.0.0-beta.21)'
        required: true
        type: string
    secrets:
      access_key:
        description: 'Linear pipeline access key'
        required: true

permissions:
  contents: read

jobs:
  linear:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      # Attach merged issues to the X.Y.Z release and record a link.
      - name: Sync issues to release
        uses: linear/linear-release-action@ad7da502eec3a93dd17e2e249e6c1cd84e3ee588 # v0.14.0
        with:
          access_key: ${{ secrets.access_key }}
          command: sync
          release_version: ${{ inputs.version }}
          name: ${{ inputs.release_name }} ${{ inputs.version }}
          links: |
            ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.release_tag }}

      # Prerelease: advance the stage only (release stays open -> tickets stay "Ready for Release").
      - name: Advance stage (alpha/beta)
        if: inputs.channel != 'stable'
        uses: linear/linear-release-action@ad7da502eec3a93dd17e2e249e6c1cd84e3ee588 # v0.14.0
        with:
          access_key: ${{ secrets.access_key }}
          command: update
          release_version: ${{ inputs.version }}
          stage: ${{ inputs.channel == 'alpha' && 'Alpha' || 'Beta' }}

      # Stable: complete the release -> fires the "On release completion -> Done" automation.
      - name: Complete release (stable)
        if: inputs.channel == 'stable'
        uses: linear/linear-release-action@ad7da502eec3a93dd17e2e249e6c1cd84e3ee588 # v0.14.0
        with:
          access_key: ${{ secrets.access_key }}
          command: complete
          release_version: ${{ inputs.version }}
