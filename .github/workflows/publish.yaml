name: Release & Publish

# Changesets-driven release pipeline (wagmi model).
#
# On every push to main:
#   1. verify     — reuse Tests workflow (build + test) as the release gate.
#   2. changesets — open/refresh the "chore: version packages" PR. When that PR is
#                   merged there are no pending changesets, so hasChangesets == 'false'.
#   3. release    — runs only when hasChangesets == 'false' (the version PR just landed).
#                   Publishes to npm via `changeset publish` and creates GitHub Releases.
#                   Holds the OIDC `id-token: write` permission for npm provenance.
#   4. linear-release — single static anchor: only when @lifi/sdk was published,
#                   sync the published version into the Linear "SDK" pipeline.
#
# NOTE: filename is intentionally kept as `publish.yaml` — the npmjs.com trusted
# publisher (OIDC) is pinned to this workflow path. Do not rename.
on:
  push:
    branches: [main]
  # Canary preview releases are opt-in via the `release-canary` PR label.
  pull_request:
    types: [labeled]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    # The main-release chain runs on push only — never on the pull_request
    # (labeled) event that drives canary previews.
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/tests.yaml

  changesets:
    name: Version
    needs: verify
    # Prevent this job from running on forks.
    if: github.repository == 'lifinance/sdk'
    permissions:
      contents: write # to push the version branch / create the version PR
      pull-requests: write # to open the "chore: version packages" PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so Changesets can build correct changelogs.
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Create version PR
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm changeset:version
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    needs: changesets
    # Only publish once the version PR has been merged (no pending changesets left).
    if: needs.changesets.outputs.hasChangesets == 'false'
    permissions:
      contents: write # to create GitHub Releases / tags
      id-token: write # OIDC token for npm provenance (trusted publishing)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install

      - name: Publish to npm
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: pnpm changeset:publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  # Extract the @lifi/sdk version + channel from publishedPackages so the reusable
  # Linear workflow receives concrete (version, channel) inputs rather than parsing
  # the JSON itself. Single static anchor — keyed on @lifi/sdk only.
  linear-meta:
    name: Linear Meta (SDK)
    needs: release
    # Only when @lifi/sdk itself was published. publishedPackages is a JSON string like
    # [{"name":"@lifi/sdk","version":"4.0.0-beta.12"},...]. A provider-only release cycle
    # won't bump @lifi/sdk, so the "SDK" Linear release is intentionally skipped for that
    # cycle (no fallback anchor — see CLAUDE.md "Anchor coverage policy").
    if: contains(needs.release.outputs.publishedPackages, '"@lifi/sdk"')
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      full: ${{ steps.meta.outputs.full }}
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      - name: Resolve SDK version and channel
        id: meta
        env:
          PUBLISHED: ${{ needs.release.outputs.publishedPackages }}
        run: |
          FULL="$(echo "$PUBLISHED" | jq -r '.[] | select(.name=="@lifi/sdk") | .version')"
          VERSION="${FULL%%-*}" # 4.0.0-beta.12 -> 4.0.0
          case "$FULL" in
            *-alpha.*) CHANNEL=alpha ;;
            *-beta.*)  CHANNEL=beta ;;
            *)         CHANNEL=stable ;;
          esac
          echo "full=$FULL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Resolved @lifi/sdk $FULL -> version=$VERSION channel=$CHANNEL"

  linear-release:
    name: Linear Sync (SDK)
    needs: linear-meta
    permissions:
      contents: read
    uses: ./.github/workflows/linear-release.yaml
    with:
      release_name: SDK
      version: ${{ needs.linear-meta.outputs.version }}
      channel: ${{ needs.linear-meta.outputs.channel }}
      release_tag: '@lifi/sdk@${{ needs.linear-meta.outputs.full }}'
    secrets:
      access_key: ${{ secrets.LINEAR_RELEASE_ACCESS_KEY }}

  # ---------------------------------------------------------------------------
  # Canary preview release (opt-in, per PR).
  #
  # Add the `release-canary` label to a PR to publish a throwaway
  # 0.0.0-canary-<timestamp> build of the changed packages to npm under the
  # `canary` dist-tag, so the branch can be shared for testing (internally or
  # with external integrators). One-shot: the label is removed after a publish;
  # re-add it to cut another canary.
  #
  # Trust boundary — matches the OLD `v*-beta.N` tag-push flow, which already
  # let anyone with write access publish unreviewed branch code to npm via OIDC:
  #   * same-repo branches only (forks/external PRs cannot trigger it)
  #   * the label-applier must have write access, verified fail-closed
  #   * isolated job: only id-token/contents/PR perms; no deploy/Linear secrets
  # NEVER convert this to pull_request_target.
  canary:
    name: Canary release (PR preview)
    if: >-
      github.event_name == 'pull_request'
      && github.event.label.name == 'release-canary'
      && github.event.pull_request.head.repo.full_name == github.repository
      && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # npm OIDC trusted publishing + provenance
      pull-requests: write # post the install comment + remove the label
    steps:
      - name: Verify the actor has write access (fail-closed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.event.sender.login }}
        run: |
          # `.permission` returns the legacy base role: admin | write | read | none
          # (maintain maps to write, triage maps to read). Write access or higher is
          # the trust bar — the same people who can push branches and who could
          # publish via the old `v*-beta.N` tag flow.
          PERM=$(gh api "repos/${{ github.repository }}/collaborators/${ACTOR}/permission" --jq '.permission' 2>/dev/null || echo none)
          echo "Actor ${ACTOR} has '${PERM}' access to ${{ github.repository }}."
          case "$PERM" in
            admin|write) : ;;
            *) echo "::error::release-canary requires write access to ${{ github.repository }}; '${ACTOR}' has '${PERM}'."; exit 1 ;;
          esac

      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install
      # sdk is in Changesets pre mode; `--snapshot` is disallowed in pre
      # mode, so exit it in THIS throwaway checkout only. Never committed/pushed.
      - name: Exit pre mode (ephemeral)
        run: pnpm changeset pre exit

      - name: Version changed packages as canary
        run: pnpm changeset version --snapshot canary

      - name: Detect whether a canary version was produced
        id: detect
        run: |
          VER=$(grep -hoE '0\.0\.0-canary-[0-9]+' packages/*/package.json | head -1 || true)
          if [ -n "$VER" ]; then
            echo "version=$VER" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Will publish canary $VER"
          else
            echo "::warning::No changeset in this PR — nothing to publish as canary."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + prerelease transform
        if: steps.detect.outputs.publish == 'true'
        run: pnpm changeset:prepublish

      - name: Publish canary to npm
        if: steps.detect.outputs.publish == 'true'
        run: pnpm changeset publish --tag canary --no-git-tag
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Comment the install command on the PR
        if: steps.detect.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.detect.outputs.version }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body "📦 **Canary published** under the \`canary\` dist-tag at \`${VER}\`.

          Install the exact version (recommended — \`@canary\` moves with the newest canary across PRs):
          \`\`\`bash
          npm i @lifi/sdk@${VER}
          \`\`\`"

      - name: Remove the release-canary label (one-shot)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit "${{ github.event.pull_request.number }}" --remove-label release-canary || true
