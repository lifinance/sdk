name: Release & Publish

# Changesets-driven release pipeline.
#
# On every push to main:
#   1. verify     — reuse Tests workflow (build + test) as the release gate.
#   2. changesets — open/refresh the "chore: version packages" PR. When that PR is
#                   merged there are no pending changesets, so hasChangesets == 'false'.
#   3. release    — runs only when hasChangesets == 'false' (the version PR just landed).
#                   Publishes to npm via `changeset publish` and creates GitHub Releases.
#                   Holds the OIDC `id-token: write` permission for npm provenance.
#   4. linear-release — single static anchor: only when @lifi/sdk was published,
#                   sync the published version into the Linear "SDK" pipeline.
#
# NOTE: filename is intentionally kept as `publish.yaml` — the npmjs.com trusted
# publisher (OIDC) is pinned to this workflow path. Do not rename.
on:
  push:
    branches: [main]
  workflow_dispatch: # manual re-trigger if a Version-PR merge push needs re-running
  # Preview releases are opt-in via the `release-preview` PR label.
  pull_request:
    types: [labeled]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {} # each job declares only the permissions it needs

jobs:
  verify:
    name: Verify
    # The main-release chain runs on push only — never on the pull_request
    # (labeled) event that drives preview releases.
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    uses: ./.github/workflows/tests.yaml

  changesets:
    name: Version
    needs: verify
    # Prevent this job from running on forks.
    if: github.repository == 'lifinance/sdk'
    permissions:
      contents: write # to push the version branch / create the version PR
      pull-requests: write # to open the "chore: version packages" PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so Changesets can build correct changelogs.
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install
        with:
          cache: 'false' # privileged job — don't restore a potentially poisoned cache

      - name: Create version PR
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm changeset:version
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    needs: changesets
    # Only publish once the version PR has been merged (no pending changesets left).
    if: needs.changesets.outputs.hasChangesets == 'false'
    permissions:
      contents: write # to create GitHub Releases / tags
      id-token: write # OIDC token for npm provenance (trusted publishing)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install
        with:
          cache: 'false' # privileged job — don't restore a potentially poisoned cache

      - name: Publish to npm
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: pnpm changeset:publish
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  # Sync the published @lifi/sdk release into the Linear "SDK" pipeline. Single
  # static anchor — a provider-only cycle won't bump @lifi/sdk, so it's
  # intentionally skipped (no fallback anchor). linear-release.yaml derives the
  # version + channel from publishedPackages internally.
  linear-release:
    name: Linear Sync (SDK)
    needs: release
    if: contains(needs.release.outputs.publishedPackages, '"@lifi/sdk"')
    permissions:
      contents: read
    uses: ./.github/workflows/linear-release.yaml
    with:
      release_name: SDK
      package_name: '@lifi/sdk'
      published_packages: ${{ needs.release.outputs.publishedPackages }}
    secrets:
      access_key: ${{ secrets.LINEAR_RELEASE_ACCESS_KEY }}

  # ---------------------------------------------------------------------------
  # Preview release (opt-in, per PR).
  #
  # Add the `release-preview` label to a PR to publish a throwaway
  # 0.0.0-preview-<sha> build to the npm `preview` dist-tag for testing.
  # One-shot: the label is removed after a publish; re-add to cut another.
  #
  # Trust boundary (no in-workflow role check): applying a label requires Triage+,
  # and the same-repo guard means the code was pushed with Write access — so
  # forks/externals can't trigger it. The job is isolated (no deploy/Linear
  # secrets), and 0.0.0-preview can never become `latest`/`beta`.
  # NEVER convert this to pull_request_target.
  preview:
    name: Preview release (PR)
    if: >-
      github.event_name == 'pull_request'
      && github.event.label.name == 'release-preview'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # npm OIDC trusted publishing + provenance
      pull-requests: write # post the install comment + remove the label
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install
        with:
          cache: 'false' # privileged job — don't restore a potentially poisoned cache

      # Snapshot-publish to the `preview` dist-tag + comment the install command.
      # Composite (not reusable workflow) so OIDC stays bound to publish.yaml.
      # The action auto-detects pre mode from .changeset/pre.json and exits it
      # ephemerally when present (sdk is currently in pre-beta).
      - name: Publish preview
        uses: ./.github/actions/preview-publish
