name: Tests

on:
  # Reused as publish.yaml's verify gate (workflow_call). No push:[main] trigger —
  # main is covered once via that gate; PRs via pull_request below.
  workflow_call:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - '.editorconfig'
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        uses: ./.github/actions/pnpm-install
      - name: Lint and format check
        run: pnpm check
      - name: Build packages
        run: pnpm build
      - name: Check types
        run: pnpm check:types
      - name: Run tests
        run: pnpm test
