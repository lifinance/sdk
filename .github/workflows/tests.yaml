name: Tests

on:
  # Allow the release pipeline (publish.yaml) to reuse this as its verify gate.
  # No push:[main] trigger — main coverage runs exactly once via publish.yaml's
  # verify job (which reuses this workflow); PRs are covered by pull_request below.
  workflow_call:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - '.editorconfig'
    branches:
      - main

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        uses: ./.github/actions/pnpm-install
      - name: Lint and format check
        run: pnpm check
      - name: Build packages
        run: pnpm build
      - name: Check types
        run: pnpm check:types
      - name: Run tests
        run: pnpm test
